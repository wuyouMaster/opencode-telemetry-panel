name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check package and cargo versions match tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          CARGO_VERSION=$(node -e "const fs=require('fs'); const match=fs.readFileSync('src-tauri/Cargo.toml','utf8').match(/^version\s*=\s*\"([^\"]+)\"/m); if(!match) process.exit(1); console.log(match[1])")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo version ${CARGO_VERSION}"
            exit 1
          fi

  build:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: opencode-telemetry-panel-windows-x64.exe
            source: OpenCodeTelemetryPanel.exe
            fallback_source: opencode-telemetry-panel.exe
          - os: macos-15-intel
            artifact: opencode-telemetry-panel-macos-x64
            source: OpenCodeTelemetryPanel
            fallback_source: opencode-telemetry-panel
          - os: macos-15
            artifact: opencode-telemetry-panel-macos-arm64
            source: OpenCodeTelemetryPanel
            fallback_source: opencode-telemetry-panel

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install
        env:
          OPENCODE_TELEMETRY_PANEL_SKIP_DOWNLOAD: "1"

      - name: Build executable
        run: bun run build:exe

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p release
          if [ -f "src-tauri/target/release/${{ matrix.source }}" ]; then
            cp "src-tauri/target/release/${{ matrix.source }}" "release/${{ matrix.artifact }}"
          else
            cp "src-tauri/target/release/${{ matrix.fallback_source }}" "release/${{ matrix.artifact }}"
          fi

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: [validate, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenCode Telemetry Panel ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-artifacts/*

  publish_npm:
    needs: [validate, release]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install
        env:
          OPENCODE_TELEMETRY_PANEL_SKIP_DOWNLOAD: "1"

      - name: Typecheck
        run: bun run typecheck

      - name: Verify publish contents
        run: npm pack --dry-run

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
