name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: opencode-telemetry-panel-windows-x64.exe
            suffix: .exe
          - os: macos-13
            artifact: opencode-telemetry-panel-macos-x64
            suffix: ""
          - os: macos-14
            artifact: opencode-telemetry-panel-macos-arm64
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install

      - name: Build executable
        run: bun run build:exe

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p release
          if [ -f "src-tauri/target/release/OpenCodeTelemetryPanel${{ matrix.suffix }}" ]; then
            cp "src-tauri/target/release/OpenCodeTelemetryPanel${{ matrix.suffix }}" "release/${{ matrix.artifact }}"
          else
            cp "src-tauri/target/release/opencode-telemetry-panel${{ matrix.suffix }}" "release/${{ matrix.artifact }}"
          fi

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Check version matches tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${VERSION}"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenCode Telemetry Panel ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-artifacts/*
